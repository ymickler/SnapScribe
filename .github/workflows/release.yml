name: SnapScribe Release CI

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release Type (major, minor, patch)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      custom_version:
        description: 'Custom Version (e.g. 1.2.3, optional - overrides Release Type)'
        required: false
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew || true

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Prepare Release Asset
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk release-artifacts/SnapScribe.apk

      - name: Generate Version Tag
        id: versioning
        run: |
          # Fetch all tags to determine the latest release tag
          git fetch --tags --force || true
          
          # Get the latest tag, default to v1.0.0 if none exists
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "Latest tag found: $LATEST_TAG"
          
          # Strip the leading 'v' if present
          VERSION_CLEAN=${LATEST_TAG#v}
          
          # Split into major, minor, patch
          IFS='.' read -r major minor patch <<< "$VERSION_CLEAN"
          
          # Set fallbacks if parsing fails
          major=${major:-1}
          minor=${minor:-0}
          patch=${patch:-0}
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual workflow dispatch
            if [ -n "${{ github.event.inputs.custom_version }}" ]; then
              VERSION="v${{ github.event.inputs.custom_version }}"
              echo "Using custom version: $VERSION"
            else
              RELEASE_TYPE="${{ github.event.inputs.release_type }}"
              echo "Release type selected: $RELEASE_TYPE"
              if [ "$RELEASE_TYPE" = "major" ]; then
                major=$((major + 1))
                minor=0
                patch=0
              elif [ "$RELEASE_TYPE" = "minor" ]; then
                minor=$((minor + 1))
                patch=0
              else
                patch=$((patch + 1))
              fi
              VERSION="v$major.$minor.$patch"
            fi
          else
            # Triggered automatically on push to main (defaults to patch increment)
            patch=$((patch + 1))
            VERSION="v$major.$minor.$patch"
          fi
          
          echo "Generated version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag_name=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: SnapScribe ${{ env.VERSION }}
          draft: false
          prerelease: false
          files: release-artifacts/SnapScribe.apk
          body: |
            ## SnapScribe Release ${{ env.VERSION }}
            
            This release was automatically generated by GitHub Actions.
            
            ### Features
            - **Local-first transcription**: Voice message transcribing optimized for German & English.
            - **Flexible Display Modes**: Swap between floating HUD overlay or standard system notifications.
            - **Smart settings**: Persists preferred transcription language locally.
            - **100% Privacy**: No servers or external APIs used.
            
            ### Download
            - Download the direct APK file: [**SnapScribe.apk**](https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/SnapScribe.apk)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
