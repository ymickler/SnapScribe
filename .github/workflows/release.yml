name: SnapScripe Release CI

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/**'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradle/wrapper/gradlew || true

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Prepare Release Asset
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk release-artifacts/SnapScripe.apk

      - name: Generate Version Tag
        id: versioning
        run: |
          # SemVer auto-version based on GitHub Action run number
          VERSION="v1.0.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag_name=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: SnapScripe ${{ env.VERSION }}
          draft: false
          prerelease: false
          files: release-artifacts/SnapScripe.apk
          body: |
            ## SnapScripe Release ${{ env.VERSION }}
            
            This release was automatically generated by GitHub Actions on push to `main`.
            
            ### Features
            - **Local-first transcription**: Voice message transcribing optimized for German & English.
            - **Overlay System alert UI**: Transparent overlay running directly on top of WhatsApp.
            - **Smart settings**: Persists preferred transcription language locally.
            - **100% Privacy**: No servers or external APIs used.
            
            ### Download
            - Download the direct APK file: [**SnapScripe.apk**](https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/SnapScripe.apk)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
